// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  screen:"login", lang:null, user:null, pinInput:"", pinError:false,
  round:"Start of Shift",
  inspTime:(()=>{const n=new Date();return String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");})(),
  activeLine:"Line 1",
  lineData:emptyLineData(),
  logs:[], loading:true, saving:false, saved:false,
  alertSent:false, showModal:false, pendingFail:[],
  eosData:{wastage:{},oil:{},bestLine:"",training:"",issues:""},
  firebaseReady:false, dbRef:null,
};

function emptyLineData(){ const o={}; LINES.forEach(l=>{o[l]={};}); return o; }
function nowTime(){ const n=new Date(); return String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0"); }
function setState(patch){ Object.assign(state,patch); render(); }

// ── Firebase ──────────────────────────────────────────────────────────────────
let db, logsRef;
try {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  logsRef = ref(db, "qc_logs");
  onValue(logsRef, snap => {
    const data = snap.val();
    const logs = data ? Object.entries(data).map(([k,v])=>({...v,_key:k})).sort((a,b)=>b.id-a.id) : [];
    setState({logs, loading:false, firebaseReady:true});
  });
} catch(e) {
  console.error("Firebase init failed:", e);
  // fallback to localStorage
  try {
    const saved = localStorage.getItem("roti_qc_logs");
    state.logs = saved ? JSON.parse(saved) : [];
  } catch(_){}
  state.loading = false;
  state.firebaseReady = false;
  render();
}

async function saveLog(entry){
  if(state.firebaseReady && db){
    try { await push(logsRef, entry); return; } catch(e){ console.error(e); }
  }
  // fallback
  const logs = [entry,...state.logs];
  localStorage.setItem("roti_qc_logs", JSON.stringify(logs));
  setState({logs});
}
async function deleteLog(key, id){
  if(state.firebaseReady && db && key){
    try { await remove(ref(db,"qc_logs/"+key)); return; } catch(e){ console.error(e); }
  }
  const logs = state.logs.filter(l=>l.id!==id);
  localStorage.setItem("roti_qc_logs", JSON.stringify(logs));
  setState({logs});
}

    ROTI:[

      {id:"puff",     label:t.puff,     type:"toggle",  options:[t.yes,t.no]},

      {id:"diameter", label:t.diameter, type:"toggle",  options:[t.ok,t.notOk]},
      {id:"weight",   label:t.weight,   type:"number",  unit:"g", min:30, max:120, step:0.5, hint:t.hintWeight},
    ],
    TEMP:[
      {id:"stack_temp",   label:t.stackTemp,   type:"number", unit:"°C", min:30, max:250, step:0.5},
      {id:"prepack_temp", label:t.prepackTemp, type:"number", unit:"°C", min:25, max:100, step:0.5,
       hint:t.hintPrepack, warnMsg:t.warnPrepack, warn:v=>parseFloat(v)>40,
       critical:true, criticalLabel:"Pre-pack temp >40°C"},
    ],
    PACKING:[
      {id:"pack_weight",  label:t.packWeight,  type:"number", unit:"g", min:100, max:600, step:1},
      {id:"butter_paper", label:t.butterPaper, type:"toggle", options:[t.yes,t.no]},
    ],
    HYGIENE:[
      {id:"surface",  label:t.surface,  type:"rating5"},
      {id:"conveyor", label:t.conveyor, type:"rating5"},
      {id:"floor",    label:t.floor,    type:"rating5"},
      {id:"pest",     label:t.pest,     type:"toggle", options:[t.no,t.yes], warnVal:t.yes,
       critical:true, criticalLabel:"Pest sighting reported"},
      {id:"comments", label:t.comments, type:"text", placeholder:t.hintComments},
    ],
    EMP:[
      {id:"ppe",        label:t.ppe,        type:"toggle", options:[t.yes,t.no], warnVal:t.no,
       critical:true, criticalLabel:"PPE non-compliance"},
      {id:"uniform",    label:t.uniform,    type:"rating5"},
      {id:"jewellery",  label:t.jewellery,  type:"toggle", options:[t.no,t.yes], warnVal:t.yes,
       critical:true, criticalLabel:"Jewellery worn on floor"},
      {id:"defaulters", label:t.defaulters, type:"text", placeholder:t.hintDefaulters},
    ],
  };
}
function getAllRequired(t){ const f=getFields(t); return [...f.ROTI,...f.TEMP,...f.PACKING,...f.HYGIENE,...f.EMP].filter(x=>x.type!=="text"); }
function getAllCritical(t){ const f=getFields(t); return [...f.ROTI,...f.TEMP,...f.PACKING,...f.HYGIENE,...f.EMP].filter(x=>x.critical); }
function lineFilledCount(d,req){ if(!d) return 0; return req.filter(f=>d[f.id]!==undefined&&d[f.id]!=="").length; }
function getCriticalFailures(lineData,crit){
  const out=[];
  LINES.forEach(ln=>{
    const d=lineData[ln]||{};
    crit.forEach(f=>{
      const v=d[f.id];
      if(v===undefined||v==="") return;
      if((f.warn&&f.warn(v))||(f.warnVal&&v===f.warnVal))
        out.push({line:ln,label:f.criticalLabel||f.label,value:v});
    });
  });
  return out;
}

function sendWA(round,inspTime,username,failures){
  const now=new Date().toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"});
  let m="🚨 *QC ALERT — "+round+(inspTime?" ("+inspTime+")":"")+"*\nTime: "+now+"\nBy: "+username+"\n\n*Failures:*\n";

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportCSV(){
  const logs=state.logs;
  if(!logs.length){showToast("No records to export");return;}
  const ids=["color","puff","texture","diameter","weight","stack_temp","prepack_temp","pack_weight","butter_paper","surface","conveyor","floor","pest","comments","ppe","uniform","jewellery","defaulters"];
  const headers=["Date","Time","Round","Insp Time","User","Role",...LINES.flatMap(ln=>ids.map(id=>ln+" - "+id)),"EOS Wastage","EOS Oil","EOS Best Line","EOS Training","EOS Issues"];
  const rows=logs.map(log=>{
    const d=new Date(log.id);
    const wastage=LINES.map(ln=>LINE_MACHINES[ln].map(mc=>(log.eosData?.wastage?.[ln]?.[mc]||"")).join("+")).join(" | ");
    const oil=LINES.map(ln=>(log.eosData?.oil?.[ln]||"")).join(" | ");
    return[
      d.toLocaleDateString("en-IN"),d.toLocaleTimeString("en-IN"),log.round,log.inspectionTime||"",log.username,log.role,
      ...LINES.flatMap(ln=>ids.map(id=>'"'+(String(log.lineData?.[ln]?.[id]??"").replace(/"/g,"'"))+'"')),
      '"'+wastage+'"','"'+oil+'"',log.eosData?.bestLine||"",'"'+(log.eosData?.training||"")+'"','"'+(log.eosData?.issues||"")+'"'
    ];
  });
  const csv=[headers,...rows].map(r=>r.join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="QC_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}

// ── HTML helpers ──────────────────────────────────────────────────────────────
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false) return;
      el.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return el;
}
function div(style,children){ return h("div",{style},children); }
function btn(style,text,onClick){ return h("button",{style,onClick},text); }
function span(style,text){ return h("span",{style},text); }

// ── Render helpers ────────────────────────────────────────────────────────────
function makeHdr(title,sub,rightNodes,onBack,backLabel){
  const el=div({background:"#1a1814",borderBottom:"1px solid rgba(255,255,255,0.10)",padding:"14px 18px",display:"flex",alignItems:"center",gap:"10px"});
  if(onBack){
    el.appendChild(btn({background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:"8px",color:"#F0EDE8",padding:"8px 14px",fontSize:"16px",fontWeight:"700",cursor:"pointer"},backLabel||"← Back",onBack));
  } else {
    const logo=div({width:"30px",height:"30px",background:"#F0A500",borderRadius:"7px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:"0"},"◉");
    el.appendChild(logo);
  }
  const mid=div({flex:"1",marginLeft:onBack?"4px":"0"});
  mid.appendChild(div({fontSize:"16px",fontWeight:"800",color:"#F0EDE8",letterSpacing:"-0.01em"},title));
  if(sub) mid.appendChild(div({fontSize:"14px",color:"rgba(240,237,232,0.45)"},sub));
  el.appendChild(mid);
  if(rightNodes)(Array.isArray(rightNodes)?rightNodes:[rightNodes]).forEach(n=>n&&el.appendChild(n));
  return el;
}

function makeSection(title,color,icon,fields,lineData,onChange,syncKey){
  const wrap=div({marginBottom:"22px"});
  const titleRow=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"});
  titleRow.appendChild(span({fontSize:"16px"},icon));
  titleRow.appendChild(span({fontSize:"11px",fontWeight:"800",color,letterSpacing:"0.07em",textTransform:"uppercase"},title));
  const line=div({flex:"1",height:"1px",background:color+"33",marginLeft:"4px"});
  titleRow.appendChild(line);
  wrap.appendChild(titleRow);
  fields.forEach(f=>{
    wrap.appendChild(makeField(f,lineData?.[f.id],v=>onChange(f.id,v),color,syncKey));
  });
  return wrap;
}

function makeField(f,value,onChange,sectionColor,syncKey){
  if(f.type==="toggle") return makeToggle(f,value,onChange);
  if(f.type==="rating5") return makeRating(f,value,onChange);
  if(f.type==="number") return makeNumber(f,value,onChange,syncKey);
  if(f.type==="text") return makeTextarea(f,value,onChange,syncKey);
  return div({},"");
}

function makeToggle(f,value,onChange){
  const isWarn=v=>f.warnVal&&v===f.warnVal;
  const wrap=div({marginBottom:"16px"});
  const lbl=div({marginBottom:"6px"});
  lbl.appendChild(span({fontSize:"16px",fontWeight:"700",color:isWarn(value)?C.red:C.text},f.label));
  wrap.appendChild(lbl);

function makeLogRow(log,onDelete){
  const d=new Date(log.id);
  const col=ROUND_COLORS[log.round]||"#38A8E8";
  const critIds=[
    {id:"prepack_temp",warn:v=>parseFloat(v)>40,label:"Pre-pack >40°C"},
    {id:"pest",warnVals:["Yes","हाँ"],label:"Pest sighting"},
    {id:"ppe",warnVals:["No","नहीं"],label:"PPE fail"},
    {id:"jewellery",warnVals:["Yes","हाँ"],label:"Jewellery"},
  ];
  const failures=[];
  LINES.forEach(ln=>{
    const ld=log.lineData?.[ln]||{};
    critIds.forEach(f=>{
      const v=ld[f.id];
      if(!v) return;
      if((f.warn&&f.warn(v))||(f.warnVals&&f.warnVals.includes(v))) failures.push(ln+": "+f.label);
    });
  });
  const card=div({background:C.surface,border:"1px solid "+(failures.length?C.red+"66":C.border),borderRadius:"10px",padding:"12px 14px",marginBottom:"8px"});
  const inner=div({display:"flex",justifyContent:"space-between",alignItems:"flex-start"});
  const left=div({flex:"1"});
  const tags=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px",flexWrap:"wrap"});
  tags.appendChild(span({fontSize:"11px",fontWeight:"800",color:col,background:col+"22",padding:"2px 8px",borderRadius:"20px"},log.round));
  if(log.inspectionTime) tags.appendChild(span({fontSize:"13px",color:C.amber,fontWeight:"700",fontFamily:"'DM Mono',monospace"},log.inspectionTime));
  tags.appendChild(span({fontSize:"14px",color:C.text,fontWeight:"700"},log.username));
  left.appendChild(tags);
  left.appendChild(div({fontSize:"13px",color:C.muted},d.toLocaleDateString("en-IN")+" · "+d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})));
  if(failures.length){
    const ftags=div({marginTop:"5px",display:"flex",flexWrap:"wrap",gap:"4px"});
    failures.forEach(f=>ftags.appendChild(span({fontSize:"10px",fontWeight:"700",color:C.red,background:C.red+"18",padding:"2px 6px",borderRadius:"4px"},f)));
    left.appendChild(ftags);
  }
  inner.appendChild(left);
  if(onDelete){
    inner.appendChild(btn({background:"rgba(232,92,56,0.1)",border:"none",color:C.red,borderRadius:"6px",padding:"5px 10px",fontSize:"13px",cursor:"pointer",marginLeft:"8px"},"✕",onDelete));
  }
  card.appendChild(inner);
  return card;
}

function handlePin(d){
  if(state.pinError){setState({pinError:false,pinInput:""});}
  const next=state.pinInput+d;
  if(next.length<4){setState({pinInput:next});return;}
  const found=USERS.find(u=>u.pin===next);
  if(found){setState({user:found,screen:"lang",pinInput:"",pinError:false});}
  else{setState({pinInput:next,pinError:true});setTimeout(()=>setState({pinInput:"",pinError:false}),800);}

    {id:"ppe",warnVals:["No","नहीं"],label:"PPE fail"},
    {id:"jewellery",warnVals:["Yes","हाँ"],label:"Jewellery"},
  ];
  const allFail=today.flatMap(log=>LINES.flatMap(ln=>{
    const ld=log.lineData?.[ln]||{};
    return critIds.filter(f=>{const v=ld[f.id];return v&&((f.warn&&f.warn(v))||(f.warnVals&&f.warnVals.includes(v)));})
      .map(f=>({line:ln,label:f.label,time:log.id}));
  }));
  const lineStatus={};
  LINES.forEach(ln=>{
    let score=0,count=0;
    today.forEach(log=>{const d=log.lineData?.[ln]||{};if(d.color!==undefined){score+=d.color;count++;}});
    lineStatus[ln]={avg:count?Math.round(score/count*10)/10:null,hasCrit:allFail.some(f=>f.line===ln),logs:today.filter(l=>l.lineData?.[ln]&&Object.keys(l.lineData[ln]).length>0).length};

    const isActive=ln===state.activeLine, isDone=filled===allReq.length;
    const hasCrit=getCriticalFailures({[ln]:state.lineData[ln]},allCrit).length>0;
    const col=isDone?C.green:isActive?C.amber:C.muted;
    tabs.appendChild(btn({padding:"8px 14px",background:isActive?C.amber+"18":C.surface,border:"2px solid "+(isActive?C.amber:isDone?C.green+"66":hasCrit?C.red+"66":C.border),borderRadius:"20px",color:col,fontWeight:"800",fontSize:"15px",cursor:"pointer"},ln+(isDone?" ✓":hasCrit?" ⚠":""),()=>setState({activeLine:ln})));
  });
  wrap.appendChild(tabs);

  const body=div({padding:"16px 18px",maxWidth:"500px",margin:"0 auto"});
  const curData=state.lineData[state.activeLine]||{};
  const curFilled=lineFilledCount(curData,allReq);

  // Line card
  const lcard=div({background:C.amber+"12",border:"1px solid "+C.amber+"44",borderRadius:"12px",padding:"12px 16px",marginBottom:"20px",display:"flex",justifyContent:"space-between",alignItems:"center"});
  const lcLeft=div({});
  lcLeft.appendChild(div({fontSize:"18px",fontWeight:"800",color:C.amber},state.activeLine));
  lcLeft.appendChild(div({fontSize:"15px",color:C.muted,marginTop:"2px"},t.filled(curFilled,allReq.length)));
  lcard.appendChild(lcLeft);
  lcard.appendChild(div({fontSize:"22px",fontWeight:"800",fontFamily:"'DM Mono',monospace",color:C.amber},Math.round(curFilled/allReq.length*100)+"%"));
  body.appendChild(lcard);

  const setF=(fid,v)=>{
    const newLineData={...state.lineData,[state.activeLine]:{...(state.lineData[state.activeLine]||{}),[fid]:v}};
    setState({lineData:newLineData});
  };

  body.appendChild(makeSection(t.secRoti,   C.amber, "◉",fields.ROTI,   curData,setF,state.activeLine));
  body.appendChild(makeSection(t.secTemp,   C.red,   "⊕",fields.TEMP,   curData,setF,state.activeLine));
  body.appendChild(makeSection(t.secPacking,C.blue,  "▣",fields.PACKING,curData,setF,state.activeLine));
  body.appendChild(makeSection(t.secHygiene,C.green, "✦",fields.HYGIENE,curData,setF,state.activeLine));
  body.appendChild(makeSection(t.secEmp,    C.purple,"◈",fields.EMP,    curData,setF,state.activeLine));

  const lineIdx=LINES.indexOf(state.activeLine);
  const navRow=div({display:"flex",gap:"10px",marginBottom:"12px"});
  if(lineIdx>0) navRow.appendChild(btn({flex:"1",background:C.surface,border:"1px solid "+C.border,borderRadius:"10px",color:C.muted,fontWeight:"700",fontSize:"16px",padding:"12px",cursor:"pointer"},"← "+LINES[lineIdx-1],()=>setState({activeLine:LINES[lineIdx-1]})));
  if(lineIdx<LINES.length-1) navRow.appendChild(btn({flex:"1",background:C.surface,border:"1px solid "+C.amber+"66",borderRadius:"10px",color:C.amber,fontWeight:"700",fontSize:"16px",padding:"12px",cursor:"pointer"},LINES[lineIdx+1]+" →",()=>setState({activeLine:LINES[lineIdx+1]})));
  body.appendChild(navRow);

  const submitLabel=state.saved?t.saved:state.saving?t.saving:t.submitBtn(pct);
  body.appendChild(btn({width:"100%",border:"none",borderRadius:"12px",background:state.saved?C.green:C.amber,color:C.bg,fontWeight:"800",fontSize:"18px",padding:"15px",cursor:"pointer",transition:"background 0.3s",opacity:state.saving?0.7:1},submitLabel,handleSubmit));
  body.appendChild(div({height:"40px"}));
  wrap.appendChild(body);
  return wrap;
}

function renderEOS(t){
  const wrap=div({minHeight:"100vh",background:C.bg,color:C.text});
  wrap.appendChild(makeHdr("End of Shift",state.user.username+" · Closing Parameters",[],()=>setState({screen:"home"}),t.back));
  wrap.appendChild(div({height:"4px",background:C.purple+"33"},h("div",{style:{height:"100%",width:"100%",background:C.purple}})));

  const body=div({padding:"16px 18px",maxWidth:"500px",margin:"0 auto"});

  // Wastage
  const wsec=div({marginBottom:"24px"});
  const wtitle=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"});
  wtitle.appendChild(span({fontSize:"18px"},"⚖"));
  wtitle.appendChild(span({fontSize:"13px",fontWeight:"800",color:C.amber,letterSpacing:"0.07em",textTransform:"uppercase"},"Wastage (kg) — Machine-wise"));
  wtitle.appendChild(div({flex:"1",height:"1px",background:C.amber+"33",marginLeft:"4px"}));
  wsec.appendChild(wtitle);
  LINES.forEach(ln=>{
    const lblock=div({marginBottom:"16px"});
    lblock.appendChild(div({fontSize:"15px",fontWeight:"800",color:C.text,marginBottom:"8px"},ln));
    LINE_MACHINES[ln].forEach(mc=>{
      const row=div({display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"});
      row.appendChild(span({fontSize:"14px",color:C.muted,minWidth:"60px"},mc));
      const inp=h("input",{type:"number",inputmode:"decimal",min:"0",max:"999",step:"0.1",placeholder:"0.0",style:{flex:"1",background:"rgba(255,255,255,0.07)",border:"2px solid "+C.border,borderRadius:"10px",color:C.text,fontSize:"18px",fontWeight:"700",fontFamily:"'DM Mono',monospace",padding:"10px 14px",outline:"none"}});
      inp.value=state.eosData.wastage?.[ln]?.[mc]??"";
      inp.addEventListener("input",e=>{
        const newEos={...state.eosData,wastage:{...state.eosData.wastage,[ln]:{...(state.eosData.wastage[ln]||{}),[mc]:e.target.value}}};
        state.eosData=newEos;
      });
      row.appendChild(inp);
      row.appendChild(span({fontSize:"14px",fontWeight:"700",color:C.amber},"kg"));
      lblock.appendChild(row);
    });
    wsec.appendChild(lblock);
  });
  body.appendChild(wsec);

  // Oil boxes
  const osec=div({marginBottom:"24px"});
  const otitle=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"});
  otitle.appendChild(span({fontSize:"18px"},"🛢"));
  otitle.appendChild(span({fontSize:"13px",fontWeight:"800",color:C.blue,letterSpacing:"0.07em",textTransform:"uppercase"},"Oil Boxes Filled"));
  otitle.appendChild(div({flex:"1",height:"1px",background:C.blue+"33",marginLeft:"4px"}));
  osec.appendChild(otitle);
  LINES.forEach(ln=>{
    const lblock=div({marginBottom:"12px"});
    lblock.appendChild(div({fontSize:"15px",fontWeight:"700",color:C.text,marginBottom:"6px"},ln));
    const row=div({display:"flex",gap:"8px"});
    ["Yes","No"].forEach(opt=>{
      const sel=state.eosData.oil?.[ln]===opt, col=opt==="No"?C.red:C.green;
      const b=btn({flex:"1",padding:"10px 0",border:"2px solid "+(sel?col:C.border),borderRadius:"10px",background:sel?col+"25":C.surface,color:sel?col:C.muted,fontWeight:"700",fontSize:"16px",cursor:"pointer"},opt,()=>{
        state.eosData={...state.eosData,oil:{...state.eosData.oil,[ln]:opt}};
        render();
      });
      row.appendChild(b);
    });
    lblock.appendChild(row);
    osec.appendChild(lblock);
  });
  body.appendChild(osec);

  // Best line
  const bsec=div({marginBottom:"24px"});
  const btitle=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"});
  btitle.appendChild(span({fontSize:"18px"},"🏆"));
  btitle.appendChild(span({fontSize:"13px",fontWeight:"800",color:C.green,letterSpacing:"0.07em",textTransform:"uppercase"},"Best Line of Shift"));
  btitle.appendChild(div({flex:"1",height:"1px",background:C.green+"33",marginLeft:"4px"}));
  bsec.appendChild(btitle);
  const brow=div({display:"flex",flexWrap:"wrap",gap:"8px"});
  LINES.forEach(ln=>{
    const sel=state.eosData.bestLine===ln;
    brow.appendChild(btn({padding:"10px 18px",border:"2px solid "+(sel?C.green:C.border),borderRadius:"10px",background:sel?C.green+"22":C.surface,color:sel?C.green:C.muted,fontWeight:"800",fontSize:"16px",cursor:"pointer"},(sel?"🏆 ":"")+ln,()=>{state.eosData={...state.eosData,bestLine:ln};render();}));
  });
  bsec.appendChild(brow);
  body.appendChild(bsec);

  // Training
  const trsec=div({marginBottom:"24px"});
  const trtitle=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"});
  trtitle.appendChild(span({fontSize:"18px"},"📋"));
  trtitle.appendChild(span({fontSize:"13px",fontWeight:"800",color:C.purple,letterSpacing:"0.07em",textTransform:"uppercase"},"Training Required"));
  trtitle.appendChild(div({flex:"1",height:"1px",background:C.purple+"33",marginLeft:"4px"}));
  trsec.appendChild(trtitle);
  const trta=h("textarea",{placeholder:"Staff names who need training…",rows:"3",style:{width:"100%",background:C.surface,border:"1.5px solid "+C.border,borderRadius:"10px",color:C.text,fontSize:"16px",padding:"12px 14px",outline:"none",resize:"none",fontFamily:"'DM Sans',sans-serif",display:"block"}});
  trta.value=state.eosData.training||"";
  trta.addEventListener("input",e=>{state.eosData={...state.eosData,training:e.target.value};});
  trsec.appendChild(trta);
  body.appendChild(trsec);

  // Issues
  const issec=div({marginBottom:"24px"});
  const istitle=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"});
  istitle.appendChild(span({fontSize:"18px"},"⚠"));
  istitle.appendChild(span({fontSize:"13px",fontWeight:"800",color:C.red,letterSpacing:"0.07em",textTransform:"uppercase"},"Any Issues"));
  istitle.appendChild(div({flex:"1",height:"1px",background:C.red+"33",marginLeft:"4px"}));
  issec.appendChild(istitle);
  const ista=h("textarea",{placeholder:"Any issues, observations or follow-up actions…",rows:"3",style:{width:"100%",background:C.surface,border:"1.5px solid "+C.border,borderRadius:"10px",color:C.text,fontSize:"16px",padding:"12px 14px",outline:"none",resize:"none",fontFamily:"'DM Sans',sans-serif",display:"block"}});
  ista.value=state.eosData.issues||"";
  ista.addEventListener("input",e=>{state.eosData={...state.eosData,issues:e.target.value};});
  issec.appendChild(ista);
  body.appendChild(issec);

  const submitLabel=state.saved?"✓ Shift Closed!":state.saving?"Saving…":"Close Shift & Submit";
  body.appendChild(btn({width:"100%",border:"none",borderRadius:"12px",background:state.saved?C.green:C.purple,color:"#fff",fontWeight:"800",fontSize:"18px",padding:"15px",cursor:"pointer",opacity:state.saving?0.7:1},submitLabel,handleEosSubmit));
  body.appendChild(div({height:"40px"}));
  wrap.appendChild(body);
  return wrap;
}

function renderHistory(){
  const t=T[state.lang||"en"];
  const wrap=div({minHeight:"100vh",background:C.bg,color:C.text});
  const csvBtn=btn({background:C.blue,border:"none",borderRadius:"8px",color:C.bg,padding:"7px 12px",fontSize:"15px",fontWeight:"800",cursor:"pointer"},t.exportCSV,exportCSV);
  wrap.appendChild(makeHdr(t.history,state.logs.length+" submissions",[csvBtn],()=>setState({screen:"home"}),t.back));
  const body=div({padding:"16px 18px",maxWidth:"500px",margin:"0 auto"});
  if(state.logs.length===0) body.appendChild(div({textAlign:"center",color:C.muted,padding:"60px 0"},t.noRecords));
  else state.logs.forEach(l=>body.appendChild(makeLogRow(l,()=>deleteLog(l._key,l.id))));
  body.appendChild(div({height:"40px"}));
  wrap.appendChild(body);
  return wrap;
}

// ── Submit handlers ───────────────────────────────────────────────────────────
function handleSubmit(){
  const t=T[state.lang||"en"];
  const allCrit=getAllCritical(t);
  const fails=getCriticalFailures(state.lineData,allCrit);
  if(fails.length>0&&!state.alertSent){setState({pendingFail:fails,showModal:true});return;}
  doSubmit();
}
async function doSubmit(){
  setState({saving:true});
  const entry={id:Date.now(),timestamp:new Date().toISOString(),round:state.round,inspectionTime:state.inspTime,username:state.user.username,role:state.user.role,lineData:JSON.parse(JSON.stringify(state.lineData))};
  await saveLog(entry);
  showToast("✓ Submitted!");
  setState({saving:false,saved:true,alertSent:false});
  setTimeout(()=>setState({saved:false,screen:"home",lineData:emptyLineData(),pendingFail:[],inspTime:nowTime()}),1600);
}
async function handleEosSubmit(){
  setState({saving:true});
  const entry={id:Date.now(),timestamp:new Date().toISOString(),round:"End of Shift",inspectionTime:state.inspTime,username:state.user.username,role:state.user.role,lineData:JSON.parse(JSON.stringify(state.lineData)),eosData:JSON.parse(JSON.stringify(state.eosData))};
  await saveLog(entry);
  showToast("✓ Shift Closed!");
  setState({saving:false,saved:true});
  setTimeout(()=>setState({saved:false,screen:"home",lineData:emptyLineData(),eosData:{wastage:{},oil:{},bestLine:"",training:"",issues:""},inspTime:nowTime()}),1600);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(state.loading){
    app.appendChild(div({minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontFamily:"'DM Sans',sans-serif"},"Loading…"));
    return;
  }
  let screen;
  switch(state.screen){
    case "login":   screen=renderLogin(); break;
    case "lang":    screen=renderLang(); break;
    case "home":    screen=renderHome(); break;
    case "form":    screen=renderForm(); break;
    case "history": screen=renderHistory(); break;
    default:        screen=renderLogin();
  }
  app.appendChild(screen);
}

render();
</script>
</body>
</html>
